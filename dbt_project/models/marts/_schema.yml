version: 2

sources:
  - name: evaluation
    database: ANALYTICS_DB
    schema: EVALUATION
    description: "Evaluation pipeline outputs."
    tables:
      - name: eval_results
        description: "One row per question per evaluation run."

models:
  - name: mart_customer_support_context
    description: "Agent-ready context table. One row per order+line-item enriched with customer profile."
    columns:
      - name: order_key
        description: "Order identifier — primary lookup key for the agent."
      - name: customer_key
      - name: customer_name
      - name: customer_phone
      - name: market_segment
      - name: order_status
      - name: order_date
      - name: ship_date
      - name: ship_mode
      - name: part_name
      - name: quantity
      - name: net_price
      - name: customer_total_orders
        description: "Lifetime order count for this customer."
      - name: customer_total_spend
        description: "Lifetime total spend for this customer."

  - name: mart_eval_results_summary
    description: "Aggregated eval results per run read by Streamlit."
    columns:
      - name: run_id
        description: "UUID for the evaluation run."
      - name: run_timestamp
      - name: total_questions
      - name: pass_count
      - name: fail_count
      - name: pass_rate
        description: "Fraction of questions that passed."
      - name: avg_score
      - name: p90_score
        description: "90th-percentile score for the run."
