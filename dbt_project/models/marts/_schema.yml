version: 2

sources:
  - name: evaluation
    database: ANALYTICS_DB
    schema: EVALUATION
    description: "Evaluation pipeline outputs — written by pipeline.py, never by dbt."
    loaded_at_field: RUN_TIMESTAMP
    freshness:
      warn_after: {count: 7, period: day}
    tables:
      - name: eval_results
        description: "One row per question per evaluation run."
        columns:
          - name: RUN_ID
            description: "UUID shared by all rows in one pipeline run."
            data_tests: [not_null]
          - name: AGENT_NAME
            description: "Provider key — openai or gemini."
            data_tests: [not_null]
          - name: MODEL_NAME
            description: "Resolved model string, e.g. gpt-4o or gemini-2.5-flash."
            data_tests: [not_null]
          - name: QUESTION
            description: "The golden-suite question posed to the agent."
            data_tests: [not_null]
          - name: ORDER_CONTEXT
            description: "Raw Snowflake record the agent retrieved, stored as JSON string. Ground truth for the evaluator."
          - name: AGENT_RESPONSE
            description: "Full natural-language reply produced by the agent."
          - name: SCORE
            description: "Claude's numeric score 0.0–1.0."
            data_tests: [not_null]
          - name: REASONING
            description: "One-sentence Claude verdict."
            data_tests: [not_null]
          - name: EVAL_EXPLANATION
            description: "2–4 sentence breakdown from Claude citing specific order record values."
          - name: PASS
            description: "True when score >= 0.75."
            data_tests: [not_null]
          - name: RUBRIC_ID
            description: "Rubric category applied — status_accuracy, shipping_accuracy, etc."
            data_tests: [not_null]
          - name: RUN_TIMESTAMP
            description: "UTC timestamp when the pipeline run started."
            data_tests: [not_null]

models:
  - name: mart_customer_support_context
    description: "Agent-ready context table. One row per order+line-item enriched with customer profile."
    columns:
      - name: order_key
        description: "Order identifier — primary lookup key for the agent."
        data_tests:
          - not_null
      - name: customer_key
        data_tests:
          - not_null
      - name: customer_name
      - name: customer_phone
      - name: market_segment
      - name: order_status
      - name: order_date
      - name: ship_date
      - name: ship_mode
      - name: part_name
      - name: quantity
      - name: net_price
      - name: customer_total_orders
        description: "Lifetime order count for this customer."
      - name: customer_total_spend
        description: "Lifetime total spend for this customer."

  - name: mart_eval_results_summary
    description: "Aggregated eval results per run per agent, read by Streamlit dashboard."
    columns:
      - name: run_id
        description: "UUID for the evaluation run."
        data_tests:
          - not_null
          - unique
      - name: agent_name
        description: "Agent provider that produced the responses (e.g. openai, gemini)."
        data_tests:
          - not_null
      - name: model_name
        description: "Specific model version used (e.g. gpt-4o, gemini-2.5-flash)."
        data_tests:
          - not_null
      - name: run_timestamp
        data_tests:
          - not_null
      - name: total_questions
      - name: pass_count
      - name: fail_count
      - name: pass_rate
        description: "Fraction of questions that passed."
      - name: avg_score
      - name: p90_score
        description: "90th-percentile score for the run."
